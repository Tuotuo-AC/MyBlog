version: '3.8'

services:
  db:
    image: mysql:8
    container_name: agent_blog_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agent_myblog        # 关键：数据库名
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog_network

  redis:
    image: redis:alpine
    container_name: agent_blog_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - blog_network

  web:
    build: .
    container_name: agent_blog_web
    restart: unless-stopped
#    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: MyBlog.settings
      DB_NAME: agent_myblog               # 数据库名
      DB_USER: bloguser
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - blog_network

  nginx:
    image: nginx:alpine
    container_name: agent_blog_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80" # 取消注释，将宿主机 80 映射到容器 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    networks:
      - blog_network

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  blog_network:
    driver: bridge