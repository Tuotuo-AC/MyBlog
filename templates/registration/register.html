{% extends 'base.html' %}

{% block title %}注册 - 我的博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title mb-0">注册新账号</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                已有账号？<a href="{% url 'login' %}">立即登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
