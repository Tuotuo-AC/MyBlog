{% extends 'base.html' %}

{% block title %}确认删除 - 我的博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="card-title mb-0">确认删除</h3>
            </div>
            <div class="card-body">
                <p class="lead">你确定要永久删除以下文章吗？</p>
                <p><strong>标题：</strong> {{ post.title }}</p>
                <p><strong>作者：</strong> {{ post.author.username }}</p>
                <p><strong>发布时间：</strong> {{ post.publish_time|date:"Y-m-d H:i" }}</p>
                <p class="text-danger">此操作不可撤销！</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">是的，删除</button>
                    <a href="{% url 'article:detail' post.slug %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
